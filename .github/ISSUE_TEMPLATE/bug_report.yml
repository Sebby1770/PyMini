name: Bug report
description: Report a reproducible parser, evaluator, VM, or tooling problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    attributes:
      label: Engine
      options: [Evaluator, VM, Parser, REPL or CLI, GC simulator]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Minimal PyMini program and command
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected and observed behavior
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Checks
      options:
        - label: I ran `make verify` or explained why it cannot run.
          required: true
        - label: This report does not contain an undisclosed sandbox escape.
          required: true
